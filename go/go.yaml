# Config for github.com/nirantaraai/nava's mage/golang runner.
# Every value here is consumed by go/magefile.go through zero-argument
# Mage targets (`mage go:build`, `mage go:test`, ...) — this file is the
# only place command-line flags for the Go toolchain live. There are no
# .sh scripts anywhere in this tree; nava/Mage is the entire build path.
directory: "."

setup:
  modDownload: true
  modTidy: true

build:
  output: bin/grok
  main: ./cmd/grok
  noCGO: true

run:
  main: ./cmd/grok

test:
  packages: ["./..."]

# Integration tests (real external processes — today: MongoDB via
# testcontainers-go) live under tests/integration/, separate from the
# *_test.go files next to each package that test:/race:/coverage: above
# already cover. They're gated behind the "integration" build tag so
# `mage go:test`/`go:race`/`go:vet` (which walk ./...) never try to
# compile or run them; `mage go:integration` is the only target that
# does, and it requires a reachable Docker daemon.
integration:
  packages: ["./tests/integration/..."]
  args: ["-tags=integration", "-v"]

race:
  packages: ["./..."]

coverage:
  packages: ["./..."]
  output: coverage.out

vet:
  packages: ["./..."]

lint:
  args: ["./..."]

format:
  args: ["./..."]
